<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CJ Tracker">
<meta name="theme-color" content="#0e0f0d">
<link rel="apple-touch-icon" href="https://static.vecteezy.com/system/resources/previews/036/365/658/non_2x/golf-club-logo-design-inspiration-simple-modern-minimalist-logo-vector.jpg">
<title>CJ Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Karla:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Oxanium:wght@600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0e0f0d;--surface:#161814;--surface2:#1e2019;--surface3:#252820;
  --border:#2a2d24;--border2:#333628;
  --green:#6dbb5a;--green-dim:#3d6e2e;--green-pale:rgba(109,187,90,0.08);
  --amber:#d4962a;--amber-pale:rgba(212,150,42,0.10);
  --blue:#5b8fd4;--blue-pale:rgba(91,143,212,0.10);
  --red:#d45b5b;--red-pale:rgba(212,91,91,0.10);
  --purple:#9b7dd4;--purple-pale:rgba(155,125,212,0.10);
  --teal:#4ab8a8;--teal-pale:rgba(74,184,168,0.10);
  --slate:#606870;--slate-pale:rgba(96,104,112,0.15);
  --text:#dde0cc;--text-mid:#7a7e6a;--text-dim:#3a3d2e;--white:#ecefd8;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);font-family:'Karla',sans-serif;color:var(--text);display:flex;flex-direction:column;font-size:14px;}

/* ── TOPBAR ── */
.topbar{display:flex;flex-direction:column;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;padding-top:env(safe-area-inset-top);}
.topbar-row1{display:flex;align-items:center;justify-content:space-between;padding:8px 16px 6px;gap:8px;}
.topbar-row2{display:flex;align-items:center;padding:0 12px 8px;gap:4px;}
.logo{font-family:'Oxanium',sans-serif;font-size:0.82rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--white);white-space:nowrap;flex-shrink:0;}
.logo em{color:var(--green);font-style:normal;}
.nav-tabs{display:flex;gap:4px;flex:1;}
.nav-tab{flex:1;padding:5px 6px;font-family:'Barlow Condensed',sans-serif;font-size:0.68rem;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;background:transparent;border:1px solid transparent;border-radius:5px;color:var(--text-mid);cursor:pointer;transition:all .15s;white-space:nowrap;text-align:center;}
.nav-tab.active{background:var(--surface2);border-color:var(--border2);color:var(--green);}
.deadline-pill{font-family:'Barlow Condensed',sans-serif;font-size:0.65rem;font-weight:700;letter-spacing:0.5px;background:var(--surface2);border:1px solid var(--border2);border-radius:5px;padding:3px 8px;color:var(--text-dim);white-space:nowrap;flex-shrink:0;}
.deadline-pill span{color:var(--amber);}

/* ── LAYOUT ── */
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.view{display:none;flex:1;min-height:0;flex-direction:column;}
.view.active{display:flex;}
.scroll{flex:1;min-height:0;overflow-y:auto;padding:14px 20px 32px;}
.scroll::-webkit-scrollbar{width:4px;}
.scroll::-webkit-scrollbar-thumb{background:var(--border2);}

/* ── WEEK NAV ── */
.week-nav{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;gap:10px;flex-wrap:wrap;}
.wnav-btn{background:var(--surface2);border:1px solid var(--border2);color:var(--text-mid);padding:5px 12px;border-radius:5px;font-family:'Barlow Condensed',sans-serif;font-size:0.72rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .15s;}
.week-title{font-family:'Barlow Condensed',sans-serif;font-size:0.95rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--white);text-align:center;}
.week-sub{font-size:0.62rem;text-align:center;color:var(--text-mid);margin-top:1px;}
.prog-bar{height:2px;background:var(--border);flex-shrink:0;}
.prog-fill{height:100%;background:var(--green);transition:width .3s;}

/* ── WEEK TYPE SELECTOR ── */
.week-type-row{display:flex;align-items:center;gap:6px;padding:6px 14px;background:var(--surface2);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:nowrap;overflow-x:auto;}
.wt-label{font-size:0.62rem;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;color:var(--text-mid);white-space:nowrap;flex-shrink:0;}
.wt-btn{padding:4px 9px;font-family:'Barlow Condensed',sans-serif;font-size:0.65rem;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;background:transparent;border:1px solid var(--border2);border-radius:4px;color:var(--text-dim);cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;}
.wt-btn.active{border-color:var(--green-dim);color:var(--green);background:var(--green-pale);}
.wt-btn.amber{border-color:rgba(212,150,42,0.4);}
.wt-btn.amber.active{border-color:var(--amber);color:var(--amber);background:var(--amber-pale);}
.wt-btn.blue{border-color:rgba(91,143,212,0.3);}
.wt-btn.blue.active{border-color:var(--blue);color:var(--blue);background:var(--blue-pale);}

/* ── TODAY HIGHLIGHT ── */
.day-section.today .day-lbl{color:var(--green);}
.day-section.today .day-hdr::before{content:'TODAY';font-family:'Barlow Condensed',sans-serif;font-size:0.58rem;font-weight:700;letter-spacing:1.5px;background:var(--green);color:#0e0f0d;padding:2px 6px;border-radius:3px;margin-right:4px;}
.day-section.today .day-line{background:var(--green-dim);}

/* ── DAY SECTION ── */
.day-section{margin-bottom:8px;}
.day-hdr{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.day-lbl{font-family:'Barlow Condensed',sans-serif;font-size:0.88rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--white);}
.day-line{flex:1;height:1px;background:var(--border);}
.day-done-badge{font-family:'Barlow Condensed',sans-serif;font-size:0.58rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--green);background:var(--green-pale);border:1px solid var(--green-dim);padding:2px 7px;border-radius:3px;}

/* ── SESSION CARD ── */
.scard{background:var(--surface);border:1px solid var(--border);border-radius:9px;margin-bottom:6px;overflow:hidden;transition:border-color .15s;}
.scard.done{border-color:var(--green-dim);}
.scard.skipped{opacity:0.38;}
.scard-top{display:flex;align-items:center;gap:8px;padding:9px 12px;}
.check-btn{width:20px;height:20px;border-radius:4px;border:2px solid var(--border2);background:transparent;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.check-btn.done{background:var(--green);border-color:var(--green);}
.check-btn.done::after{content:'✓';font-size:11px;color:#0e0f0d;font-weight:800;}
.type-dot{width:7px;height:7px;border-radius:2px;flex-shrink:0;}
.scard-info{flex:1;min-width:0;}
.scard-title{font-size:0.78rem;font-weight:600;color:var(--text);line-height:1.2;}
.scard-time{font-size:0.63rem;color:var(--text-mid);margin-top:1px;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.4px;}
.star-row{display:flex;gap:2px;flex-shrink:0;}
.star{font-size:13px;cursor:pointer;color:var(--text-dim);transition:color .1s;line-height:1;}
.star.lit{color:var(--amber);}
.expand-btn{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:11px;padding:2px 4px;transition:transform .15s;flex-shrink:0;}
.expand-btn.open{transform:rotate(180deg);}

/* ── EDIT PENCIL ── */
.edit-pencil{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:11px;padding:2px 5px;border-radius:4px;transition:color .15s;flex-shrink:0;}
.edit-pencil:hover{color:var(--amber);}

/* ── SESSION DETAIL ── */
.scard-detail{display:none;padding:0 12px 12px;border-top:1px solid var(--border);}
.scard-detail.open{display:block;}
.det-label{font-size:0.62rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-mid);margin:9px 0 4px;}
.notes-ta{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:5px;padding:7px 9px;font-family:'Karla',sans-serif;font-size:0.74rem;color:var(--text);resize:vertical;min-height:52px;outline:none;transition:border-color .15s;}
.notes-ta:focus{border-color:var(--green-dim);}
.notes-ta::placeholder{color:var(--text-dim);}

/* ── MUSCLE GROUPS ── */
.muscle-grid{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px;}
.mg-check{display:flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border2);border-radius:5px;padding:4px 8px;cursor:pointer;transition:all .15s;user-select:none;}
.mg-check.checked{background:var(--blue-pale);border-color:var(--blue);}
.mg-check input{display:none;}
.mg-label{font-size:0.68rem;font-weight:600;color:var(--text-mid);}
.mg-check.checked .mg-label{color:var(--blue);}

/* ── SKIP BTN ── */
.skip-btn{margin-top:7px;background:transparent;border:1px solid var(--border2);color:var(--text-dim);padding:3px 9px;border-radius:4px;font-size:0.65rem;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .15s;}
.skip-btn:hover{border-color:var(--red);color:var(--red);}
.skip-btn.active{background:var(--red-pale);border-color:var(--red);color:var(--red);}

/* ── LOG ROUND BTN ── */
.log-round-btn{width:100%;margin-bottom:7px;background:var(--purple-pale);border:1px dashed var(--purple);color:var(--purple);padding:9px;border-radius:9px;font-family:'Barlow Condensed',sans-serif;font-size:0.78rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .15s;}
.log-round-btn:hover{background:rgba(155,125,212,0.15);}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.78);z-index:200;display:flex;align-items:center;justify-content:center;padding:14px;}
.overlay.hidden{display:none;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:12px;width:100%;max-width:530px;max-height:92vh;overflow-y:auto;display:flex;flex-direction:column;}
.modal::-webkit-scrollbar{width:4px;}
.modal::-webkit-scrollbar-thumb{background:var(--border2);}
.modal-hdr{padding:16px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.modal-ttl{font-family:'Barlow Condensed',sans-serif;font-size:1.05rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--white);}
.modal-close{background:none;border:none;color:var(--text-mid);font-size:1.2rem;cursor:pointer;padding:2px 6px;line-height:1;}
.modal-body{padding:14px 18px 18px;}
.form-row{display:flex;gap:9px;margin-bottom:9px;flex-wrap:wrap;}
.fgrp{flex:1;min-width:110px;}
.flabel{font-size:0.62rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-mid);margin-bottom:3px;display:block;}
.finput{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:5px;padding:6px 9px;font-family:'Karla',sans-serif;font-size:0.78rem;color:var(--text);outline:none;transition:border-color .15s;}
.finput:focus{border-color:var(--green-dim);}

/* ── SCORECARD ── */
.sc-grid{display:grid;gap:3px;margin:8px 0;}
.sc-cell{background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:3px 2px;text-align:center;}
.sc-cell.hdr{background:var(--surface3);font-family:'Barlow Condensed',sans-serif;font-size:0.6rem;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:var(--text-mid);}
.sc-cell.total-cell{background:var(--surface3);}
.sc-hole-inp{width:100%;background:transparent;border:none;outline:none;font-family:'Karla',sans-serif;font-size:0.76rem;color:var(--text);text-align:center;}
.sc-hole-inp::placeholder{color:var(--text-dim);}
.sc-par-val{font-size:0.6rem;color:var(--text-mid);font-family:'Barlow Condensed',sans-serif;}
.sc-totals{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;}
.sc-tot{background:var(--surface2);border:1px solid var(--border2);border-radius:5px;padding:5px 10px;text-align:center;flex:1;min-width:72px;}
.sc-tot-lbl{font-size:0.58rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-mid);font-weight:600;}
.sc-tot-val{font-family:'Barlow Condensed',sans-serif;font-size:1.25rem;font-weight:800;color:var(--white);line-height:1.1;}
.sc-tot-val.gv{color:var(--green);}
.sc-tot-val.rv{color:var(--red);}
.save-btn{width:100%;margin-top:12px;background:var(--green);border:none;color:#0e0f0d;padding:10px;border-radius:7px;font-family:'Barlow Condensed',sans-serif;font-size:0.88rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:opacity .15s;}
.save-btn:hover{opacity:0.87;}

/* ── EDIT SESSION MODAL ── */
.edit-modal .modal{max-width:420px;}

/* ── ROUNDS LIST ── */
.rounds-toolbar{padding:10px 20px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;}
.round-entry{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 12px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;gap:10px;cursor:pointer;transition:border-color .15s;}
.round-entry:hover{border-color:var(--border2);}
.re-title{font-size:0.78rem;font-weight:600;color:var(--text);}
.re-sub{font-size:0.65rem;color:var(--text-mid);margin-top:2px;}
.re-score{font-family:'Barlow Condensed',sans-serif;font-size:1.55rem;font-weight:800;color:var(--white);line-height:1;}
.re-par{font-size:0.63rem;font-weight:600;text-align:right;}
.re-par.pos{color:var(--red);}
.re-par.neg{color:var(--green);}
.re-par.even{color:var(--text-mid);}
.del-btn{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:0.85rem;padding:4px;border-radius:4px;opacity:0;transition:opacity .15s;}
.round-entry:hover .del-btn{opacity:1;}

/* ── DASHBOARD ── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:7px;margin-bottom:14px;}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:12px 14px;}
.kpi-lbl{font-size:0.6rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-mid);margin-bottom:3px;}
.kpi-val{font-family:'Barlow Condensed',sans-serif;font-size:1.9rem;font-weight:900;color:var(--white);line-height:1;}
.kpi-val.gv{color:var(--green);}
.kpi-val.av{color:var(--amber);}
.kpi-sub{font-size:0.62rem;color:var(--text-dim);margin-top:2px;}
.dash-sec{font-family:'Barlow Condensed',sans-serif;font-size:0.68rem;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--text-dim);margin:12px 0 7px;}
.chart-box{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:14px;margin-bottom:9px;}
.chart-ttl{font-family:'Barlow Condensed',sans-serif;font-size:0.68rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-mid);margin-bottom:10px;}
.chart-wrap{position:relative;height:140px;width:100%;}
canvas{display:block;}
.hcp-row{display:flex;align-items:center;gap:8px;margin-bottom:9px;flex-wrap:wrap;}
.hcp-row input{background:var(--surface2);border:1px solid var(--border2);border-radius:5px;padding:5px 9px;font-family:'Karla',sans-serif;font-size:0.78rem;color:var(--text);outline:none;width:85px;}
.hcp-row input:focus{border-color:var(--green-dim);}
.hcp-row button{background:var(--green);border:none;color:#0e0f0d;padding:5px 12px;border-radius:5px;font-family:'Barlow Condensed',sans-serif;font-size:0.72rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;}
.hcp-row-lbl{font-size:0.7rem;color:var(--text-mid);}
.comp-bars{display:flex;flex-direction:column;gap:5px;}
.comp-row{display:flex;align-items:center;gap:9px;}
.comp-lbl{font-size:0.68rem;color:var(--text-mid);min-width:88px;text-align:right;}
.comp-track{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.comp-fill{height:100%;border-radius:3px;transition:width .4s;}
.comp-pct{font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;font-weight:700;color:var(--text-mid);min-width:28px;}
.no-data{font-size:0.74rem;color:var(--text-dim);font-style:italic;text-align:center;padding:18px 0;}

/* ── MUSCLE HEATMAP ── */
.muscle-heat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:6px;}
.mh-cell{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:10px 8px;text-align:center;}
.mh-name{font-family:'Barlow Condensed',sans-serif;font-size:0.72rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-mid);margin-bottom:4px;}
.mh-count{font-family:'Barlow Condensed',sans-serif;font-size:1.6rem;font-weight:900;line-height:1;}
.mh-sub{font-size:0.58rem;color:var(--text-dim);margin-top:1px;}

/* ── WEAKNESSES TAB ── */
.weak-card{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:flex-start;gap:12px;}
.weak-rank{font-family:'Barlow Condensed',sans-serif;font-size:2rem;font-weight:900;line-height:1;min-width:32px;text-align:center;}
.weak-rank.r1{color:var(--red);}
.weak-rank.r2{color:var(--amber);}
.weak-rank.r3{color:var(--amber);opacity:0.7;}
.weak-rank.r4{color:var(--text-mid);}
.weak-rank.r5{color:var(--text-dim);}
.weak-body{flex:1;}
.weak-title{font-size:0.82rem;font-weight:700;color:var(--white);margin-bottom:3px;}
.weak-stat{font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:800;margin-bottom:4px;}
.weak-desc{font-size:0.7rem;color:var(--text-mid);line-height:1.5;}
.weak-target{display:inline-block;font-size:0.62rem;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;background:var(--surface2);border:1px solid var(--border2);border-radius:4px;padding:2px 7px;margin-top:5px;color:var(--text-dim);}
.weak-bar-track{height:4px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden;}
.weak-bar-fill{height:100%;border-radius:2px;}
.no-rounds-msg{text-align:center;padding:40px 20px;}
.no-rounds-msg h3{font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:800;letter-spacing:1px;color:var(--text-mid);margin-bottom:8px;}
.no-rounds-msg p{font-size:0.74rem;color:var(--text-dim);line-height:1.6;}


/* ── EXPORT/IMPORT ── */
.backup-bar{display:flex;gap:8px;padding:8px 20px;background:var(--surface2);border-bottom:1px solid var(--border);flex-shrink:0;align-items:center;flex-wrap:wrap;}
.backup-btn{padding:5px 12px;font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;border-radius:5px;cursor:pointer;transition:all .15s;border:1px solid var(--border2);background:var(--surface);color:var(--text-mid);}
.backup-btn.export{border-color:var(--green-dim);color:var(--green);}
.backup-btn.import{border-color:rgba(91,143,212,0.4);color:var(--blue);}
.backup-lbl{font-size:0.62rem;color:var(--text-dim);letter-spacing:0.5px;margin-left:auto;}


/* ── ADD/REMOVE SESSION ── */
.add-session-btn{margin:0 0 0 auto;padding:4px 9px;font-family:'Barlow Condensed',sans-serif;font-size:0.65rem;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;background:transparent;border:1px dashed var(--green-dim);border-radius:5px;color:var(--green);cursor:pointer;transition:all .15s;flex-shrink:0;white-space:nowrap;}
.add-session-btn:hover{background:var(--green-pale);}
.remove-btn{margin-top:7px;margin-left:6px;background:transparent;border:1px solid var(--border2);color:var(--text-dim);padding:3px 9px;border-radius:4px;font-size:0.65rem;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .15s;}
.remove-btn:hover{border-color:var(--red);color:var(--red);}
.skip-remove-row{display:flex;align-items:center;gap:0;margin-top:7px;}

/* ── FLEX BADGE ── */

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let currentWeekOffset = 0;
let editingSessionId = null;
let editingSessionDay = null;
let hcpChartInst = null, scoresChartInst = null;

// ═══════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════
function load(){ try{ return JSON.parse(localStorage.getItem('cjt3')||'{}'); }catch(e){ return {}; } }
function save(d){ try{ localStorage.setItem('cjt3',JSON.stringify(d)); }catch(e){} }

function getWK(offset){
  const d = new Date(ORIGIN); d.setDate(d.getDate()+offset*7);
  return 'wk_'+d.toISOString().slice(0,10);
}

function getWD(offset){
  const data=load(), key=getWK(offset);
  if(!data[key]) data[key]={type:'regular',sessions:{},customSessions:{}};
  return {data,key};
}

// ═══════════════════════════════════════
// COUNTDOWN
// ═══════════════════════════════════════
document.getElementById('wks-left').textContent =
  Math.max(0,Math.ceil((new Date('2026-08-14')-new Date())/604800000));

// ═══════════════════════════════════════
// VIEW SWITCH
// ═══════════════════════════════════════
function switchView(v,btn){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  btn.classList.add('active');
  if(v==='dashboard') renderDashboard();
  if(v==='rounds') renderRoundsView();
  if(v==='weaknesses') renderWeaknesses();
}

// ═══════════════════════════════════════
// WEEK VIEW
// ═══════════════════════════════════════
function changeWeek(dir){ currentWeekOffset+=dir; renderWeekView(); }

function setWeekType(type, btn){
  const {data,key}=getWD(currentWeekOffset);
  data[key].type=type;
  save(data);
  document.querySelectorAll('.wt-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderWeekView();
}

function getWeekDates(offset){
  const mon=new Date(ORIGIN); mon.setDate(mon.getDate()+offset*7);
  const sun=new Date(mon); sun.setDate(sun.getDate()+6);
  const f=d=>d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  return `${f(mon)} – ${f(sun)}`;
}

function renderWeekView(){
  const {data,key}=getWD(currentWeekOffset);
  const wd=data[key];
  const wtype=wd.type||'regular';
  const removedSessions=wd.removedSessions||[];
  const addedSessions=wd.addedSessions||[];

  document.getElementById('wk-title').textContent=`Week ${currentWeekOffset+1}`;
  document.getElementById('wk-dates').textContent=getWeekDates(currentWeekOffset);

  // Sync week type buttons
  document.querySelectorAll('.wt-btn').forEach(b=>b.classList.remove('active'));
  const btns=document.querySelectorAll('.wt-btn');
  const typeIdx={regular:0,'thu-travel':1,'fri-travel':2};
  if(btns[typeIdx[wtype]]) btns[typeIdx[wtype]].classList.add('active');

  // Merge added sessions into template by day
  const template = DEFAULT_SESSIONS[wtype].map(dayObj=>({
    ...dayObj,
    sessions:[
      ...dayObj.sessions,
      ...addedSessions.filter(a=>a.day===dayObj.day).map(a=>({...a,isAdded:true}))
    ]
  }));

  let total=0, done=0;
  const container=document.getElementById('week-body');
  container.innerHTML='';

  const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const todayName=DAYS[new Date().getDay()];

  template.forEach(dayObj=>{
    const sec=document.createElement('div'); sec.className='day-section'+(dayObj.day===todayName?' today':'');
    const allDone=dayObj.sessions.filter(s=>!s.unavailable).every(s=>wd.sessions[s.id]?.done);
    sec.innerHTML=`<div class="day-hdr"><div class="day-lbl">${dayObj.day}</div><div class="day-line"></div>${allDone&&dayObj.sessions.some(s=>!s.unavailable)?'<div class="day-done-badge">✓ Done</div>':''}</div>`;

    // Log round button
    if((dayObj.day==='Saturday'||dayObj.day==='Sunday')&&wtype==='regular'){
      const b=document.createElement('button'); b.className='log-round-btn';
      b.textContent=`+ Log ${dayObj.day} Round`;
      b.onclick=()=>openRoundModal(); sec.appendChild(b);
    }

    dayObj.sessions.forEach(s=>{
      if(removedSessions.includes(s.id)) return;
      if(s.unavailable){
        const card=document.createElement('div');
        card.className='scard skipped';
        card.style.opacity='0.3';
        card.innerHTML=`<div class="scard-top"><div class="type-dot" style="background:var(--slate)"></div><div class="scard-info"><div class="scard-title">${s.title}</div><div class="scard-time">${s.time}</div></div></div>`;
        sec.appendChild(card); return;
      }

      total++;
      const sd=wd.sessions[s.id]||{};
      // Merge custom session data
      const custom=wd.customSessions&&wd.customSessions[s.id];
      const title=custom?.title||s.title;
      const time=custom?.time||s.time;
      const detail=custom?.detail||s.detail;
      const type=custom?.type||s.type;

      if(sd.done) done++;

      const card=document.createElement('div');
      card.className='scard'+(sd.done?' done':'')+(sd.skipped?' skipped':'');

      const muscleHtml=(type==='gym'||type==='rest')?buildMuscleHtml(s.id,sd.muscles||[],type):'';

      card.innerHTML=`
        <div class="scard-top">
          <div class="check-btn ${sd.done?'done':''}" data-sid="${s.id}" onclick="toggleDone('${s.id}')"></div>
          <div class="type-dot" style="background:${TYPE_CLR[type]}"></div>
          <div class="scard-info">
            <div class="scard-title">${title}${s.flex?'<span class="flex-badge">or Twilight 9</span>':''}</div>
            <div class="scard-time">${time}</div>
          </div>
          <div class="star-row">${[1,2,3,4,5].map(n=>`<span class="star ${(sd.rating||0)>=n?'lit':''}" onclick="setRating('${s.id}',${n})">★</span>`).join('')}</div>
          <button class="edit-pencil" onclick="openEditModal('${s.id}','${dayObj.day}')">✏️</button>
          <button class="expand-btn ${sd.expanded?'open':''}" onclick="toggleExpand('${s.id}')">▼</button>
        </div>
        <div class="scard-detail ${sd.expanded?'open':''}">
          <div class="det-label">Focus</div>
          <div style="font-size:0.71rem;color:var(--text-mid);margin-bottom:7px;line-height:1.5">${detail}</div>
          ${muscleHtml}
          <div class="det-label">Session Notes</div>
          <textarea class="notes-ta" placeholder="What did you work on? How did it feel?" onchange="saveNotes('${s.id}',this.value)">${sd.notes||''}</textarea>
          <div class="skip-remove-row">
            <button class="skip-btn ${sd.skipped?'active':''}" onclick="toggleSkip('${s.id}')">${sd.skipped?'Unskip':'Mark Skipped'}</button>
            <button class="remove-btn" onclick="removeSession('${s.id}','${s.isAdded?true:false}')">${s.isAdded?'✕ Delete':'✕ Remove'}</button>
          </div>
        </div>
      `;
      sec.appendChild(card);
    });

    container.appendChild(sec);
    save(data);
  });

  const pct=total>0?Math.round(done/total*100):0;
  document.getElementById('prog-fill').style.width=pct+'%';
}

function buildMuscleHtml(sid, checked, type){
  const t = type||'gym'; const groups = t==='rest' ? ['Mobility'] : MUSCLE_GROUPS.filter(m=>m!=='Mobility');
  return `<div class="det-label">${t==='rest'?'Mobility Logged':'Muscle Groups / Focus'}</div>
  <div class="muscle-grid">${groups.map(m=>`
    <div class="mg-check ${checked.includes(m)?'checked':''}" onclick="toggleMuscle('${sid}','${m}',this)">
      <span class="mg-label">${m}</span>
    </div>`).join('')}
  </div>`;
}

function toggleMuscle(sid, muscle, el){
  const {data,key}=getWD(currentWeekOffset);
  if(!data[key].sessions[sid]) data[key].sessions[sid]={};
  let muscles=data[key].sessions[sid].muscles||[];
  if(muscles.includes(muscle)) muscles=muscles.filter(m=>m!==muscle);
  else muscles.push(muscle);
  data[key].sessions[sid].muscles=muscles;
  save(data);
  el.classList.toggle('checked',muscles.includes(muscle));
}

function toggleDone(sid){
  const {data,key}=getWD(currentWeekOffset);
  if(!data[key].sessions[sid]) data[key].sessions[sid]={};
  data[key].sessions[sid].done=!data[key].sessions[sid].done;
  save(data); renderWeekView();
}

function setRating(sid,n){
  const {data,key}=getWD(currentWeekOffset);
  if(!data[key].sessions[sid]) data[key].sessions[sid]={};
  data[key].sessions[sid].rating=n;
  save(data); renderWeekView();
}

function toggleExpand(sid){
  const {data,key}=getWD(currentWeekOffset);
  if(!data[key].sessions[sid]) data[key].sessions[sid]={};
  data[key].sessions[sid].expanded=!data[key].sessions[sid].expanded;
  save(data); renderWeekView();
}

function saveNotes(sid,val){
  const {data,key}=getWD(currentWeekOffset);
  if(!data[key].sessions[sid]) data[key].sessions[sid]={};
  data[key].sessions[sid].notes=val;
  save(data);
}

function toggleSkip(sid){
  const {data,key}=getWD(currentWeekOffset);
  if(!data[key].sessions[sid]) data[key].sessions[sid]={};
  data[key].sessions[sid].skipped=!data[key].sessions[sid].skipped;

}

function openEditModal(sid, day){
  editingSessionId=sid; editingSessionDay=day;
  const {data,key}=getWD(currentWeekOffset);
  const wd=data[key];
  const wtype=wd.type||'regular';
  const template=DEFAULT_SESSIONS[wtype];
  let defSession=null;
  template.forEach(d=>d.sessions.forEach(s=>{ if(s.id===sid) defSession=s; }));
  const custom=wd.customSessions&&wd.customSessions[sid];
  document.getElementById('edit-title').value=custom?.title||defSession?.title||'';
  document.getElementById('edit-time').value=custom?.time||defSession?.time||'';
  document.getElementById('edit-detail').value=custom?.detail||defSession?.detail||'';
  document.getElementById('edit-type').value=custom?.type||defSession?.type||'gym';
  document.getElementById('edit-overlay').classList.remove('hidden');
}

function saveSessionEdit(){
  const {data,key}=getWD(currentWeekOffset);
  if(!data[key].customSessions) data[key].customSessions={};
  data[key].customSessions[editingSessionId]={
    title:document.getElementById('edit-title').value,
    time:document.getElementById('edit-time').value,
    detail:document.getElementById('edit-detail').value,
    type:document.getElementById('edit-type').value,
  };
  save(data);
  closeModal('edit-overlay');
  renderWeekView();
}

function resetSessionEdit(){
  const {data,key}=getWD(currentWeekOffset);
  if(data[key].customSessions) delete data[key].customSessions[editingSessionId];
  save(data);
  closeModal('edit-overlay');
  renderWeekView();
}

const STAT_OPTIONS=[
  {value:'putts',label:'Putts'},
  {value:'three_putts',label:'3-Putts'},
  {value:'gir',label:'Greens in Regulation'},
  {value:'fairways',label:'Fairways Hit'},
  {value:'updown',label:'Up-&-Down %'},
  {value:'penalty',label:'Penalty Strokes'},
];

function openRoundModal(){
  document.getElementById('sc-course').value='';
  document.getElementById('sc-date').value=new Date().toISOString().slice(0,10);
  document.getElementById('sc-holes').value='18';
  document.getElementById('sc-par').value='72';
  document.getElementById('sc-score').value='';
  document.getElementById('sc-diff-display').textContent='—';
  document.getElementById('sc-diff-display').style.color='var(--text-mid)';
  document.getElementById('sc-notes').value='';
  document.getElementById('stat-rows').innerHTML='';
  addStatRow();
  document.getElementById('round-overlay').classList.remove('hidden');
}

function updateParDisplay(){
  const holes=parseInt(document.getElementById('sc-holes').value);
  document.getElementById('sc-par').value=holes===9?36:72;
  updateScoreDiff();
}

function updateScoreDiff(){
  const score=parseInt(document.getElementById('sc-score').value);
  const par=parseInt(document.getElementById('sc-par').value);
  const el=document.getElementById('sc-diff-display');
  if(isNaN(score)||isNaN(par)){el.textContent='—';el.style.color='var(--text-mid)';return;}
  const d=score-par;
  el.textContent=d===0?'E':(d>0?'+'+d:''+d);
  el.style.color=d>0?'var(--red)':d<0?'var(--green)':'var(--text-mid)';
}

function addStatRow(){
  const container=document.getElementById('stat-rows');
  const row=document.createElement('div');
  row.className='form-row'; row.style.marginBottom='6px';
  row.innerHTML=`
    <div class="fgrp">
      <select class="finput stat-type">${STAT_OPTIONS.map(o=>`<option value="${o.value}">${o.label}</option>`).join('')}</select>
    </div>
    <div class="fgrp" style="max-width:90px">
      <input class="finput stat-val" type="number" placeholder="Value" min="0"/>
    </div>
    <button onclick="this.parentElement.remove()" style="background:none;border:none;color:var(--text-dim);cursor:pointer;padding:0 4px;font-size:1rem;flex-shrink:0;align-self:center;">✕</button>
  `;
  container.appendChild(row);
}

function closeModal(id){ document.getElementById(id).classList.add('hidden'); }

function saveRound(){
  const score=parseInt(document.getElementById('sc-score').value);
  const par=parseInt(document.getElementById('sc-par').value);
  // Gather stats
  const stats={};
  document.querySelectorAll('#stat-rows .form-row').forEach(row=>{
    const type=row.querySelector('.stat-type')?.value;
    const val=row.querySelector('.stat-val')?.value;
    if(type&&val) stats[type]=parseFloat(val);
  });
  const round={
    course:document.getElementById('sc-course').value||'Unknown Course',
    date:document.getElementById('sc-date').value,
    holes:parseInt(document.getElementById('sc-holes').value),
    totalScore:isNaN(score)?null:score,
    totalPar:isNaN(par)?72:par,
    stats,
    notes:document.getElementById('sc-notes').value,
  };
  const data=load();
  if(!data.rounds) data.rounds=[];
  data.rounds.unshift(round);
  save(data);
  closeModal('round-overlay');
  renderRoundsView();
}

// ROUNDS VIEW
// ═══════════════════════════════════════
function renderRoundsView(){
  const data=load(), rounds=data.rounds||[];
  const c=document.getElementById('rounds-body');
  c.innerHTML='';
  if(!rounds.length){ c.innerHTML='<div class="no-data" style="padding-top:40px">No rounds logged yet.</div>'; return; }
  rounds.forEach((r,idx)=>{
    const d=(r.totalScore&&r.totalPar)?r.totalScore-r.totalPar:null;
    const ds=d===null?'—':d===0?'E':(d>0?'+'+d:''+d);
    const dc=d===null?'even':d>0?'pos':d<0?'neg':'even';
    // Show first stat
    const statKeys=Object.keys(r.stats||{});
    const statPreview=statKeys.length>0?` · ${STAT_OPTIONS.find(s=>s.value===statKeys[0])?.label||statKeys[0]}: ${r.stats[statKeys[0]]}${statKeys.length>1?' +'+( statKeys.length-1)+' more':''}` :'';
    const row=document.createElement('div'); row.className='round-entry';
    row.innerHTML=`
      <div style="flex:1"><div class="re-title">${r.course}</div>
      <div class="re-sub">${r.date} · ${r.holes} holes${statPreview}</div></div>
      <div style="text-align:right"><div class="re-score">${r.totalScore||'—'}</div><div class="re-par ${dc}">${ds}</div></div>
      <button class="del-btn" onclick="deleteRound(${idx},event)">✕</button>
    `;
    row.addEventListener('click',()=>viewRound(idx));
    c.appendChild(row);
  });
}

function deleteRound(idx,e){
  e.stopPropagation();
  const data=load(); data.rounds.splice(idx,1); save(data); renderRoundsView();
}

function viewRound(idx){
  const data=load(), r=data.rounds[idx];

function renderDashboard(){
  const data=load();
  const rounds=data.rounds||[];
  const hcpLog=data.hcpLog||[];
  const totalR=rounds.length;
  const rounds18=rounds.filter(r=>r.holes===18&&r.totalScore);
  const avgScore=rounds18.length>0?Math.round(rounds18.reduce((a,r)=>a+r.totalScore,0)/rounds18.length):null;
  const latestHcp=hcpLog.length>0?hcpLog[hcpLog.length-1].val:18;
  const drop=+(18-latestHcp).toFixed(1);
  const wksLeft=Math.max(0,Math.ceil((new Date('2026-08-14')-new Date())/604800000));
  const rounds18best=rounds.filter(r=>r.holes===18&&r.totalScore);
  const bestRound=rounds18best.length>0?Math.min(...rounds18best.map(r=>r.totalScore)):null;

  let totalS=0,doneS=0;
  Object.keys(data).filter(k=>k.startsWith('wk_')).forEach(k=>{
    const wd=data[k]; const wtype=wd.type||'regular';
    const removed=wd.removedSessions||[];
    const added=wd.addedSessions||[];
    DEFAULT_SESSIONS[wtype].forEach(d=>d.sessions.forEach(s=>{
      if(s.unavailable) return;
      if(removed.includes(s.id)) return; // skip removed sessions
      totalS++;
      if(wd.sessions&&wd.sessions[s.id]&&wd.sessions[s.id].done) doneS++;
    }));
    // Include added sessions
    added.forEach(s=>{
      totalS++;
      if(wd.sessions&&wd.sessions[s.id]&&wd.sessions[s.id].done) doneS++;
    });
  });
  const compPct=totalS>0?Math.round(doneS/totalS*100):0;

  // Muscle heat
  const mCounts={}; MUSCLE_GROUPS.forEach(m=>mCounts[m]=0);
  Object.keys(data).filter(k=>k.startsWith('wk_')).forEach(k=>{
    const wd=data[k];
    if(wd.sessions) Object.values(wd.sessions).forEach(sd=>{
      if(sd.muscles) sd.muscles.forEach(m=>{ if(mCounts[m]!==undefined) mCounts[m]++; });
    });
  });
  const maxM=Math.max(1,...Object.values(mCounts));

  const dash=document.getElementById('dash-body');
  dash.innerHTML='';

  // KPIs
  const kg=document.createElement('div'); kg.className='kpi-grid';
  kg.innerHTML=`
    <div class="kpi"><div class="kpi-lbl">Current HCP</div><div class="kpi-val av">${latestHcp}</div><div class="kpi-sub">Target: 14.0</div></div>
    <div class="kpi"><div class="kpi-lbl">HCP Drop</div><div class="kpi-val ${drop>0?'gv':''}">${drop>0?'−'+drop:drop}</div><div class="kpi-sub">Need −4 total</div></div>
    <div class="kpi"><div class="kpi-lbl">Rounds Played</div><div class="kpi-val">${totalR}</div><div class="kpi-sub">All logged rounds</div></div>
    <div class="kpi"><div class="kpi-lbl">Avg Score</div><div class="kpi-val">${avgScore||'—'}</div><div class="kpi-sub">${rounds18.length>0?'18-hole rounds only':'no 18-hole rounds'}</div></div>
    <div class="kpi"><div class="kpi-lbl">Sessions Done</div><div class="kpi-val ${compPct>=80?'gv':''}">${compPct}%</div><div class="kpi-sub">${doneS} of ${totalS}</div></div>
    <div class="kpi"><div class="kpi-lbl">Best Round</div><div class="kpi-val ${bestRound?'gv':''}">
      ${bestRound||'—'}</div><div class="kpi-sub">${bestRound?'best 18-hole score':'no 18-hole rounds'}</div></div>
  `;
  dash.appendChild(kg);

  // HCP log
  const hs=document.createElement('div'); hs.innerHTML=`<div class="dash-sec">Handicap Tracker</div>`;
  const hr=document.createElement('div'); hr.className='hcp-row';
  hr.innerHTML=`<span class="hcp-row-lbl">Log today's HCP:</span><input type="number" step="0.1" min="0" max="36" placeholder="e.g. 16.8" id="hcp-inp"/><button onclick="logHcp()">Log</button>`;
  hs.appendChild(hr); dash.appendChild(hs);

  // Charts
  const hcpBox=document.createElement('div'); hcpBox.className='chart-box';
  hcpBox.innerHTML=`<div class="chart-ttl">Handicap vs Target</div><div class="chart-wrap"><canvas id="hcp-chart"></canvas></div>`;
  dash.appendChild(hcpBox);

  dash.innerHTML+=`<div class="dash-sec">Scoring Trend</div>`;
  const scBox=document.createElement('div'); scBox.className='chart-box';
  scBox.innerHTML=`<div class="chart-ttl">Score per Round</div><div class="chart-wrap"><canvas id="sc-chart"></canvas></div>`;
  dash.appendChild(scBox);

  // Sessions done by type — raw count, bar relative to highest
  dash.innerHTML+=`<div class="dash-sec">Sessions Done by Type</div>`;
  const compBox=document.createElement('div'); compBox.className='chart-box';
  const types=['gym','golf','driver','round','rest'];
  const tl={gym:'Lift',golf:'Short Game',driver:'Driver/Range',round:'Rounds',rest:'Recovery'};
  let ts={}; types.forEach(t=>ts[t]=0);
  Object.keys(data).filter(k=>k.startsWith('wk_')).forEach(k=>{
    const wd=data[k]; const wtype=wd.type||'regular';
    const removed=wd.removedSessions||[];
    const added=wd.addedSessions||[];
    DEFAULT_SESSIONS[wtype].forEach(d=>d.sessions.forEach(s=>{
      if(s.unavailable||!ts.hasOwnProperty(s.type)) return;
      if(removed.includes(s.id)) return;
      if(wd.sessions&&wd.sessions[s.id]&&wd.sessions[s.id].done) ts[s.type]++;
    }));
    added.forEach(s=>{
      if(!ts.hasOwnProperty(s.type)) return;
      if(wd.sessions&&wd.sessions[s.id]&&wd.sessions[s.id].done) ts[s.type]++;
    });
  });
  const maxCount=Math.max(1,...Object.values(ts));
  let ch='<div class="comp-bars">';
  types.forEach(t=>{
    const count=ts[t];
    const barW=Math.round(count/maxCount*100);
    ch+=`<div class="comp-row"><div class="comp-lbl">${tl[t]}</div><div class="comp-track"><div class="comp-fill" style="width:${barW}%;background:${TYPE_CLR[t]}"></div></div><div class="comp-pct">${count}</div></div>`;

      const cnt=mCounts[m]; const pct=cnt/maxM;
      const col=pct>0.7?'var(--green)':pct>0.4?'var(--amber)':pct>0?'var(--blue)':'var(--text-dim)';
      return `<div class="mh-cell"><div class="mh-name">${m}</div><div class="mh-count" style="color:${col}">${cnt}</div><div class="mh-sub">sessions</div></div>`;
    }).join('')
  }</div>`;
  dash.appendChild(mBox);

  // Draw charts
  setTimeout(()=>{
    const hcpCtx=document.getElementById('hcp-chart');
    if(hcpCtx){
      if(hcpChartInst){ hcpChartInst.destroy(); hcpChartInst=null; }
      const sp={x:new Date('2026-04-14').getTime(),y:18};
      const gp={x:new Date('2026-08-14').getTime(),y:14};
      const pts=[sp,...hcpLog.map(h=>({x:new Date(h.date).getTime(),y:h.val}))];
      hcpChartInst=new Chart(hcpCtx,{type:'line',data:{datasets:[
        {label:'Your HCP',data:pts,borderColor:'#d4962a',backgroundColor:'rgba(212,150,42,0.07)',tension:0.3,pointBackgroundColor:'#d4962a',pointRadius:4,fill:true},
        {label:'Target',data:[sp,gp],borderColor:'rgba(109,187,90,0.35)',borderDash:[5,5],pointRadius:0,tension:0},
      ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#7a7e6a',font:{size:10}}}},scales:{
        x:{type:'linear',ticks:{color:'#3a3d2e',font:{size:9},callback:v=>{const d=new Date(v);return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});}},grid:{color:'#1e2019'}},
        y:{reverse:true,min:12,max:20,ticks:{color:'#3a3d2e',font:{size:9}},grid:{color:'#1e2019'}},
      }}});
    }
    const scCtx=document.getElementById('sc-chart');
    if(scCtx){
      if(scoresChartInst){ scoresChartInst.destroy(); scoresChartInst=null; }
      const rounds18chart=[...rounds].filter(r=>r.holes===18).reverse();
      if(rounds18chart.length>0){
        const labs=rounds18chart.map(r=>r.date);
        const scrs=rounds18chart.map(r=>r.totalScore);
        scoresChartInst=new Chart(scCtx,{type:'line',data:{labels:labs,datasets:[
          {label:'Score',data:scrs,borderColor:'#5b8fd4',backgroundColor:'rgba(91,143,212,0.07)',tension:0.3,pointBackgroundColor:'#5b8fd4',pointRadius:4,fill:true},
        ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#7a7e6a',font:{size:10}}}},scales:{
          x:{ticks:{color:'#3a3d2e',font:{size:9}},grid:{color:'#1e2019'}},
          y:{ticks:{color:'#3a3d2e',font:{size:9}},grid:{color:'#1e2019'}},
        }}});
      } else { scCtx.parentElement.innerHTML+='<div class="no-data">No rounds logged yet.</div>'; }
    }
  },60);
}

function logHcp(){
  const v=parseFloat(document.getElementById('hcp-inp').value);
  if(isNaN(v)||v<0||v>36) return;
  const data=load(); if(!data.hcpLog) data.hcpLog=[];
  data.hcpLog.push({date:new Date().toISOString().slice(0,10),val:v});
  save(data); renderDashboard();
}

// ═══════════════════════════════════════
// WEAKNESSES
// ═══════════════════════════════════════
function renderWeaknesses(){
  const data=load(), rounds=data.rounds||[];
  const c=document.getElementById('weak-body');
  c.innerHTML='';

  if(rounds.length<2){
    c.innerHTML=`<div class="no-rounds-msg"><h3>Not Enough Data Yet</h3><p>Log at least 2 rounds to start seeing your weakness analysis. Every stat you track (putts, GIR, fairways, up-&-down) will feed into this breakdown.</p></div>`;
    return;
  }

  // Aggregate stats — skill-based only (scoring avg excluded: symptom, not cause)
  const statVals={putts:[],three_putts:[],gir:[],fairways:[],updown:[],penalty:[]};
  rounds.forEach(r=>{
    const multiplier = (r.holes===9) ? 2 : 1; // normalize 9-hole stats to 18-hole equivalent
    if(r.stats){ Object.entries(r.stats).forEach(([k,v])=>{
      if(statVals[k]!==undefined){
        // updown % doesn't scale linearly, keep as-is
        const val = (k==='updown') ? parseFloat(v) : parseFloat(v) * multiplier;
        statVals[k].push(val);
      }
    }); }
    else if(r.focusStat&&r.statVal&&statVals[r.focusStat]!==undefined){
      const val = (r.focusStat==='updown') ? parseFloat(r.statVal) : parseFloat(r.statVal) * multiplier;
      statVals[r.focusStat].push(val);
    }
  });

  const avg=arr=>arr.length>0?+(arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(1):null;

  // Build weakness items — putts, GIR, fairways, up-&-down, penalties only
  const items=[];

  // Putts
  const pAvg=avg(statVals.putts);
  if(pAvg!==null){
    const severity=Math.min(100,Math.max(0,((pAvg-28)/12)*100));
    items.push({
      stat:'Putting',
      value:pAvg+' putts/round',
      desc:`Averaging ${pAvg} putts per round. A 14 handicap typically averages 32–34 putts. Under 32 is excellent. Your putting drill sessions (Mon/Fri) are directly targeting this.`,
      target:'Goal: ≤33 putts per round',
      severity,color:'#9b7dd4',
    });
  }

  // GIR
  const tpAvg=avg(statVals.three_putts);
  if(tpAvg!==null){ const sev=Math.min(100,Math.max(0,(tpAvg/6)*100));
    items.push({stat:'3-Putts',value:tpAvg+' per round',desc:`Averaging ${tpAvg} three-putts per round (18-hole equivalent). Each 3-putt is a direct stroke wasted on the green. A 14 HCP averages 1–2 per round.`,target:'Goal: ≤1 three-putt per round',severity:sev,color:'#d45b5b'}); }

  const gAvg=avg(statVals.gir);
  if(gAvg!==null){
    const invSev=Math.min(100,Math.max(0,((9-gAvg)/9)*100));
    items.push({
      stat:'Greens in Regulation',
      value:gAvg+' GIR/round',
      desc:`Hitting ${gAvg} greens per round on average. A 14 handicap typically hits 5–7 GIR. More GIR = more birdie and par opportunities, fewer scrambles.`,
      target:'Goal: 6+ GIR per round',
      severity:invSev,color:'#5b8fd4',
    });
  }

  // Fairways
  const fAvg=avg(statVals.fairways);
  if(fAvg!==null){
    const invSev=Math.min(100,Math.max(0,((10-fAvg)/10)*100));
    items.push({
      stat:'Fairways Hit',
      value:fAvg+' fairways/round',
      desc:`Hitting ${fAvg} fairways per round. Missing fairways leads to longer approach shots from rough, inflating scores. Your Wed/Thu driver work targets this.`,
      target:'Goal: 7+ fairways per round',
      severity:invSev,color:'#d4962a',
    });
  }

  // Up & down
  const uAvg=avg(statVals.updown);
  if(uAvg!==null){
    const invSev=Math.min(100,Math.max(0,((50-uAvg)/50)*100));
    items.push({
      stat:'Up-&-Down %',
      value:uAvg+'%',
      desc:`Converting ${uAvg}% of up-&-down attempts. A 14 handicap typically converts 30–40%. This is where your Monday chipping work pays off most directly.`,
      target:'Goal: 35%+ conversion',
      severity:invSev,color:'#4ab8a8',
    });
  }

  // Penalty strokes
  const penAvg=avg(statVals.penalty);
  if(penAvg!==null){
    const severity=Math.min(100,Math.max(0,(penAvg/4)*100));
    items.push({
      stat:'Penalty Strokes',
      value:penAvg+' per round',
      desc:`Averaging ${penAvg} penalty strokes per round. Each penalty is a free stroke lost. Straighter driving and course management reduce this.`,
      target:'Goal: <1 penalty per round',
      severity,color:'#d45b5b',
    });
  }

  if(items.length===0){
    c.innerHTML='<div class="no-rounds-msg"><h3>Keep Logging Stats</h3><p>You have rounds logged but no focus stats recorded. Add putts, GIR, fairways, or up-&-down data when logging your rounds to see your weakness breakdown.</p></div>';
    return;
  }

  // Sort by severity desc
  items.sort((a,b)=>b.severity-a.severity);

  const rankCls=['r1','r2','r3','r4','r5'];

  const hdr=document.createElement('div');
  hdr.style.cssText='padding:14px 0 10px;';
  hdr.innerHTML=`
    <div class="dash-sec" style="margin:0 0 4px">Your Biggest Weaknesses</div>
    <div style="font-size:0.72rem;color:var(--text-dim);line-height:1.6">Based on ${rounds.length} logged rounds. Fix these in order — #1 is where your strokes are bleeding most.</div>
  `;
  c.appendChild(hdr);

  items.forEach((item,i)=>{
    const card=document.createElement('div'); card.className='weak-card';
    card.innerHTML=`
      <div class="weak-rank ${rankCls[i]||'r5'}">${i+1}</div>
      <div class="weak-body">
        <div class="weak-title">${item.stat}</div>
        <div class="weak-stat" style="color:${item.color}">${item.value}</div>
        <div class="weak-desc">${item.desc}</div>
        <div class="weak-target">${item.target}</div>
        <div class="weak-bar-track"><div class="weak-bar-fill" style="width:${item.severity}%;background:${item.color}"></div></div>
      </div>
    `;
    c.appendChild(card);
  });

  const note=document.createElement('div');
  note.style.cssText='font-size:0.7rem;color:var(--text-dim);text-align:center;padding:10px 0 4px;line-height:1.6;';
  note.textContent='Weakness rankings update automatically as you log more rounds. Log at least 5 rounds for reliable data.';
  c.appendChild(note);
}

// ═══════════════════════════════════════
// ADD / REMOVE SESSIONS
// ═══════════════════════════════════════
function openAddSessionModal(){
  document.getElementById('add-title').value='';
  document.getElementById('add-time').value='';
  document.getElementById('add-detail').value='';
  document.getElementById('add-type').value='golf';
  document.getElementById('add-session-overlay').classList.remove('hidden');
}

function saveAddedSession(){
  const day=document.getElementById('add-day').value;
  const title=document.getElementById('add-title').value.trim();
  const time=document.getElementById('add-time').value.trim();
  const type=document.getElementById('add-type').value;
  const detail=document.getElementById('add-detail').value.trim();
  if(!title){ alert('Please enter a session title.'); return; }

  const data=load();
  const key=getWK(currentWeekOffset);
  if(!data[key]) data[key]={type:'regular',sessions:{},customSessions:{},addedSessions:[]};
  if(!data[key].addedSessions) data[key].addedSessions=[];

  const sid='custom_'+Date.now();
  data[key].addedSessions.push({id:sid,day,title,time,type,detail});
  save(data);
  closeModal('add-session-overlay');
  renderWeekView();
}

function removeSession(sid, isAdded){
  const data=load();
  const key=getWK(currentWeekOffset);
  if(!data[key]) data[key]={type:'regular',sessions:{},customSessions:{},addedSessions:[]};
  if(isAdded==='true'||isAdded===true){
    // Permanently delete added session
    data[key].addedSessions=(data[key].addedSessions||[]).filter(s=>s.id!==sid);
    if(data[key].sessions[sid]) delete data[key].sessions[sid];
  } else {
    if(!data[key].removedSessions) data[key].removedSessions=[];
    if(data[key].removedSessions.includes(sid)){
      data[key].removedSessions=data[key].removedSessions.filter(id=>id!==sid);
    } else {
      data[key].removedSessions.push(sid);
      if(data[key].sessions[sid]) delete data[key].sessions[sid];
    }
  }
  save(data);
  renderWeekView();
}

// ═══════════════════════════════════════
// EXPORT / IMPORT
// ═══════════════════════════════════════
function exportData(){
  const data = localStorage.getItem('cjt3') || '{}';
  const blob = new Blob([data], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `cj-tracker-backup-${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    try{
      const data = JSON.parse(ev.target.result);
      localStorage.setItem('cjt3', JSON.stringify(data));
      alert('Backup restored! Reloading...');
      location.reload();
    }catch(err){
      alert('Invalid backup file.');
    }
  };
  reader.readAsText(file);
}

renderRoundsView();
